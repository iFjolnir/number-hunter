<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Number Hunter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;600;700&display=swap');

  :root {
    --bg: #0e0f11;
    --surface: #1a1c20;
    --surface-2: #24272d;
    --border: #2e3138;
    --text: #e8e9eb;
    --text-dim: #6b7080;
    --accent: #4ecdc4;
    --accent-glow: rgba(78, 205, 196, 0.15);
    --found: rgba(78, 205, 196, 0.12);
    --found-border: rgba(78, 205, 196, 0.35);
    --unfound: #1a1c20;
    --unfound-border: #2e3138;
    --danger: #ff6b6b;
    --radius: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ── HEADER ─────────────────────────────── */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 16px 16px 12px;
  }

  .title-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .title {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--accent);
  }

  .counter {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    color: var(--text-dim);
  }

  .counter span {
    color: var(--accent);
    font-weight: 700;
  }

  /* ── SEARCH BAR ─────────────────────────── */
  .search-row {
    display: flex;
    gap: 8px;
  }

  .search-input {
    flex: 1;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input::placeholder { color: var(--text-dim); }
  .search-input:focus { border-color: var(--accent); }

  .search-btn {
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: var(--radius);
    padding: 12px 20px;
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .search-btn:active { transform: scale(0.96); }

  /* ── PROGRESS BAR ───────────────────────── */
  .progress-wrap {
    padding: 0 16px;
    margin: 12px 0 4px;
  }

  .progress-bar {
    width: 100%;
    height: 4px;
    background: var(--surface);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* ── RESULT POPUP ───────────────────────── */
  .result-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .result-overlay.active { display: flex; }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 28px;
    text-align: center;
    max-width: 320px;
    width: 100%;
    animation: popIn 0.25s ease;
  }

  @keyframes popIn {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .result-number {
    font-family: 'Space Mono', monospace;
    font-size: 48px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .result-status {
    font-size: 16px;
    color: var(--text-dim);
    margin-bottom: 24px;
  }

  .result-status.found { color: var(--accent); }
  .result-status.missing { color: var(--danger); }

  .result-actions {
    display: flex;
    gap: 10px;
  }

  .result-btn {
    flex: 1;
    padding: 14px 16px;
    border-radius: var(--radius);
    border: none;
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .result-btn:active { transform: scale(0.96); }

  .btn-close {
    background: var(--surface-2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-mark {
    background: var(--accent);
    color: var(--bg);
  }

  .btn-unmark {
    background: var(--danger);
    color: #fff;
  }

  /* ── GRID ────────────────────────────────── */
  .grid-container {
    padding: 12px 12px 80px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 4px;
  }

  .cell {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--unfound);
    border: 1.5px solid var(--unfound-border);
    border-radius: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
    -webkit-user-select: none;
  }

  .cell.found {
    background: var(--found);
    border-color: var(--found-border);
    color: var(--accent);
    font-weight: 700;
  }

  .cell:active {
    transform: scale(0.92);
  }

  /* highlight when searched */
  .cell.highlight {
    animation: pulse 0.6s ease;
    box-shadow: 0 0 0 2px var(--accent), 0 0 16px var(--accent-glow);
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 2px var(--accent), 0 0 16px var(--accent-glow); }
    50% { box-shadow: 0 0 0 4px var(--accent), 0 0 24px rgba(78,205,196,0.3); }
  }

  /* ── SCROLL TO TOP ──────────────────────── */
  .scroll-top {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 44px;
    height: 44px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-size: 20px;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 50;
  }

  .scroll-top.visible { opacity: 1; }

  /* ── RANGE LABELS ───────────────────────── */
  .range-label {
    grid-column: 1 / -1;
    padding: 12px 4px 6px;
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .range-label:first-child { padding-top: 4px; }

  /* ── TOAST ───────────────────────────────── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent);
    color: var(--bg);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    padding: 10px 20px;
    border-radius: 20px;
    z-index: 300;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── RESPONSIVE ──────────────────────────── */
  @media (min-width: 480px) {
    .grid { gap: 5px; }
    .cell { font-size: 12px; border-radius: 8px; }
  }

  @media (min-width: 768px) {
    .header { padding: 20px 24px 16px; }
    .grid-container { padding: 16px 24px 80px; }
    .title { font-size: 22px; }
    .cell { font-size: 13px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="title-row">
    <div class="title">NUMBER HUNTER</div>
    <div class="counter"><span id="countFound">0</span> / 1000</div>
  </div>
  <div class="search-row">
    <input class="search-input" id="searchInput" type="number" inputmode="numeric" placeholder="1234…" min="1" max="1000">
    <button class="search-btn" id="searchBtn">CHECK</button>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>
</div>

<div class="grid-container">
  <div class="grid" id="grid"></div>
</div>

<div class="result-overlay" id="resultOverlay">
  <div class="result-card">
    <div class="result-number" id="resultNumber"></div>
    <div class="result-status" id="resultStatus"></div>
    <div class="result-actions" id="resultActions"></div>
  </div>
</div>

<button class="scroll-top" id="scrollTop">↑</button>
<div class="toast" id="toast"></div>

<script>
  const TOTAL = 1000;
  const STORAGE_KEY = 'numberHunter_found';

  // ── STATE ────────────────────────────────
  let found = new Set();

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const arr = JSON.parse(raw);
        found = new Set(arr);
      }
    } catch(e) { found = new Set(); }
  }

  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify([...found]));
  }

  // ── GRID BUILD ───────────────────────────
  const grid = document.getElementById('grid');

  function buildGrid() {
    grid.innerHTML = '';
    for (let i = 1; i <= TOTAL; i++) {
      // Range label every 100
      if ((i - 1) % 100 === 0) {
        const label = document.createElement('div');
        label.className = 'range-label';
        label.textContent = `${i}–${Math.min(i + 99, TOTAL)}`;
        grid.appendChild(label);
      }
      const cell = document.createElement('div');
      cell.className = 'cell' + (found.has(i) ? ' found' : '');
      cell.textContent = i;
      cell.dataset.num = i;
      cell.addEventListener('click', () => toggleNumber(i));
      grid.appendChild(cell);
    }
  }

  // ── TOGGLE ───────────────────────────────
  function toggleNumber(n) {
    if (found.has(n)) {
      found.delete(n);
      showToast(`${n} removed`);
    } else {
      found.add(n);
      showToast(`${n} found!`);
    }
    saveState();
    updateCell(n);
    updateCounter();
  }

  function markNumber(n, state) {
    if (state && !found.has(n)) {
      found.add(n);
    } else if (!state && found.has(n)) {
      found.delete(n);
    }
    saveState();
    updateCell(n);
    updateCounter();
  }

  function updateCell(n) {
    const cell = grid.querySelector(`[data-num="${n}"]`);
    if (cell) {
      cell.className = 'cell' + (found.has(n) ? ' found' : '');
    }
  }

  // ── COUNTER ──────────────────────────────
  function updateCounter() {
    document.getElementById('countFound').textContent = found.size;
    document.getElementById('progressFill').style.width = `${(found.size / TOTAL) * 100}%`;
  }

  // ── SEARCH ───────────────────────────────
  const searchInput = document.getElementById('searchInput');
  const searchBtn = document.getElementById('searchBtn');
  const overlay = document.getElementById('resultOverlay');

  function doSearch() {
    const val = parseInt(searchInput.value);
    if (isNaN(val) || val < 1 || val > TOTAL) {
      showToast('Enter 1–1000');
      return;
    }

    // Scroll to cell & highlight
    const cell = grid.querySelector(`[data-num="${val}"]`);
    if (cell) {
      cell.scrollIntoView({ behavior: 'smooth', block: 'center' });
      cell.classList.add('highlight');
      setTimeout(() => cell.classList.remove('highlight'), 1500);
    }

    // Show result card
    const isCovered = found.has(val);
    document.getElementById('resultNumber').textContent = val;

    const statusEl = document.getElementById('resultStatus');
    statusEl.textContent = isCovered ? 'You got this one!' : 'Not found yet';
    statusEl.className = 'result-status ' + (isCovered ? 'found' : 'missing');

    const actions = document.getElementById('resultActions');
    actions.innerHTML = '';

    const closeBtn = document.createElement('button');
    closeBtn.className = 'result-btn btn-close';
    closeBtn.textContent = 'Close';
    closeBtn.addEventListener('click', closeOverlay);
    actions.appendChild(closeBtn);

    if (isCovered) {
      const unmarkBtn = document.createElement('button');
      unmarkBtn.className = 'result-btn btn-unmark';
      unmarkBtn.textContent = 'Unmark';
      unmarkBtn.addEventListener('click', () => {
        markNumber(val, false);
        closeOverlay();
        showToast(`${val} removed`);
      });
      actions.appendChild(unmarkBtn);
    } else {
      const markBtn = document.createElement('button');
      markBtn.className = 'result-btn btn-mark';
      markBtn.textContent = 'Mark found';
      markBtn.addEventListener('click', () => {
        markNumber(val, true);
        closeOverlay();
        showToast(`${val} found!`);
      });
      actions.appendChild(markBtn);
    }

    overlay.classList.add('active');
    searchInput.value = '';
    searchInput.blur();
  }

  function closeOverlay() {
    overlay.classList.remove('active');
  }

  searchBtn.addEventListener('click', doSearch);
  searchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') doSearch();
  });
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) closeOverlay();
  });

  // ── TOAST ────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
  }

  // ── SCROLL TO TOP ────────────────────────
  const scrollTopBtn = document.getElementById('scrollTop');
  window.addEventListener('scroll', () => {
    scrollTopBtn.classList.toggle('visible', window.scrollY > 600);
  });
  scrollTopBtn.addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  // ── INIT ─────────────────────────────────
  loadState();
  buildGrid();
  updateCounter();
</script>

</body>
</html>
